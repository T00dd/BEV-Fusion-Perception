# main source of truth for everything that concerns dataset generation
# this is actually read by the automation scripts

carla:
  host: "localhost"
  port: 2000
  tm_port: 8000
  timeout: 20.0
  # synchronous fixed timestep. 0.05 = 20 Hz, matches a full lidar rotation
  # at rotation_frequency 20, so each tick yields one complete scan.
  fixed_delta_seconds: 0.05

# grid parameters for the BEV heatmap / detection range. Defined in the
# right-handed LiDAR frame (x forward, y left, z up). Also used to crop cones
# and (later) maps directly onto OpenPCDet's POINT_CLOUD_RANGE.
grid:
  extent:
    x_min: 0.0
    x_max: 50.0
    y_min: -25.0
    y_max: 25.0
    z_min: -2.0
    z_max: 2.0
  voxel_size: [0.1, 0.1, 0.15]   # metres

# Cone geometry lives in one place. gt_extraction promotes each cone point to a
# 3D box [x,y,z,dx,dy,dz,heading] using these per-class dimensions.
cones:
  z_is_base: true
  dimensions:                    # metres [dx, dy, dz] = [length, width, height]
    blue:         [0.23, 0.23, 0.32]
    yellow:       [0.23, 0.23, 0.32]
    orange_small: [0.23, 0.23, 0.32]
    orange_big:   [0.28, 0.28, 0.50]

scenes:
  count: 1                 # start at 1 to test end-to-end
  split_ratios: {train: 0.7, val: 0.15, test: 0.15}
  split_seed: 0

capture:
  max_frames_per_scene: 25    # start small
  warmup_ticks: 10            # discard initial unsettled ticks
  capture_every_n_ticks: 5    # >1 to subsample (less near-duplicate frames)

ego:
  blueprint: "vehicle.audi.tt"
  target_speed: 8.0          # m/s; vary across runs for point-density diversity
  lookahead: 6.0

sensors:
  lidar:
    # solid state lidar emulation
    channels: 128
    range: 120
    points_per_second: 1500000
    upper_fov: 10.0            # narrowed to the band where cones live
    lower_fov: -20.0
    rotation_frequency: 20
    noise_stddev: 0.0          # per-scene override via conditions.lidar_noise
    dropoff_general_rate: 0.0  # kept off for clean clouds unless noise is on
    mount: {x: 0.4, y: 0.0, z: 1.5}
    front_crop:
      enabled: true
      half_angle_deg: 60.0     # keep |azimuth| <= 60 deg (120 deg FOV)
  cameras:
    # Stereo pair for the camera branch (left + right). The rig handles any
    # number of cameras; baseline = difference in mount y.
    - name: "left"
      width: 640
      height: 480
      fov: 90
      mount: {x: 0.4, y: -0.06, z: 1.4, yaw: 0.0}
    - name: "right"
      width: 640
      height: 480
      fov: 90
      mount: {x: 0.4, y: 0.06, z: 1.4, yaw: 0.0}

# environmental conditions to vary across scenes. weather is set at scene start.
# lidar_noise is orthogonal to weather: it sets per-ray range jitter (metres)
# so we can separate weather effects (camera) from range jitter (LiDAR).
conditions:
  - name: "noon_clear"
    weather: {cloudiness: 5, precipitation: 0, sun_altitude_angle: 75,
              fog_density: 0, wetness: 0}
    lidar_noise: 0.0
  - name: "overcast"
    weather: {cloudiness: 80, precipitation: 0, sun_altitude_angle: 45,
              fog_density: 0, wetness: 0}
    lidar_noise: 0.0
  - name: "light_rain"
    weather: {cloudiness: 70, precipitation: 40, sun_altitude_angle: 40,
              fog_density: 10, wetness: 50}
    lidar_noise: {noise_stddev: 0.015, dropoff_general_rate: 0.10}
  - name: "low_sun"
    weather: {cloudiness: 10, precipitation: 0, sun_altitude_angle: 8,
              fog_density: 0, wetness: 0}
    lidar_noise: 0.01
  - name: "dusk"
    weather: {cloudiness: 30, precipitation: 0, sun_altitude_angle: -3,
              fog_density: 5, wetness: 0}
    lidar_noise: 0.01

output:
  dataset_dir: "../../dataset"     # relative to src/dataset_automation/