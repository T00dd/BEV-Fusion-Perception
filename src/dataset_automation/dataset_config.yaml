# main source of truth for everything that concerns dataset generation
# this is actually read by the automation scripts

carla:
  host: "localhost"
  port: 2000
  tm_port: 8000
  timeout: 20.0
  fixed_delta_seconds: 0.05      # 20 Hz; one full lidar rotation per tick

grid:
  extent:
    x_min: 0.0
    x_max: 50.0
    y_min: -25.0
    y_max: 25.0
    z_min: -2.0
    z_max: 2.0
  voxel_size: [0.1, 0.1, 0.15]   # metres

cones:
  z_is_base: true
  dimensions:                    # metres [dx, dy, dz]
    blue:         [0.23, 0.23, 0.32]
    yellow:       [0.23, 0.23, 0.32]
    orange_small: [0.23, 0.23, 0.32]
    orange_big:   [0.28, 0.28, 0.50]

# ONE scenes block (the previous file had it twice; YAML kept only the last,
# silently dropping zones/split_ratios/seed). Everything per-scene is here.
scenes:
  count: 900                     # ~30k frames at ~33 frames/scene (see capture)
  split_ratios: {train: 0.7, val: 0.15, test: 0.15}
  split_seed: 0
  geometry_seed: 0               # seeds per-scene zone + track randomisation
  zones: [1, 2]                  # scenes alternate randomly across these
  lobes_min: 2                   # LOW floor: some tracks stay simple/near-straight
  lobes_max_min: 5               # per-scene curve ceiling drawn in
  lobes_max_max: 9               # [lobes_max_min, lobes_max_max] -> up to tortuous

capture:
  max_frames_per_scene: 50       # cap; long tracks fill more, short ones less
  warmup_ticks: 10
  capture_every_n_ticks: 15      # 1 frame ~every 6 m at 8 m/s -> ~33 frames/scene

ego:
  blueprint: "vehicle.audi.tt"
  target_speed: 8.0
  lookahead: 6.0

sensors:
  lidar:
    # solid-state emulation: high density + narrow vertical band + front crop
    channels: 128
    range: 120
    points_per_second: 10400000
    upper_fov: 30
    lower_fov: -10
    rotation_frequency: 20
    noise_stddev: 0.0
    dropoff_general_rate: 0.0
    mount: {x: 0.4, y: 0.0, z: 1.5}
    front_crop:
      enabled: true
      half_angle_deg: 60.0
  cameras:
    - name: "left"
      width: 640
      height: 640
      fov: 80
      mount: {x: 1.6, y: -0.50, z: 1.4, yaw: 0.0}
      exposure: {mode: manual, shutter_speed: 150.0, iso: 225.0, fstop: 8.0, gamma: 2.2, focal_distance: 100000, enable_postprocess_effects: true}
    - name: "right"
      width: 640
      height: 640
      fov: 80
      mount: {x: 1.6, y: 0.50, z: 1.4, yaw: 0.0}
      exposure: {mode: manual, shutter_speed: 150.0, iso: 225.0, fstop: 8.0, gamma: 2.2, focal_distance: 100000, enable_postprocess_effects: true}

conditions:
  - name: "noon_clear"
    weather: {cloudiness: 5, precipitation: 0, sun_altitude_angle: 75,
              fog_density: 0, wetness: 0}
    lidar_noise: 0.005
  - name: "bright_cloudy"
    weather: {cloudiness: 60, precipitation: 0, sun_altitude_angle: 60,
              fog_density: 0, wetness: 0}
    lidar_noise: 0.005
  - name: "overcast"
    weather: {cloudiness: 80, precipitation: 0, sun_altitude_angle: 45,
              fog_density: 0, wetness: 0}
    lidar_noise: 0.005
  - name: "morning"
    weather: {cloudiness: 20, precipitation: 0, sun_altitude_angle: 25,
              fog_density: 0, wetness: 0}
    lidar_noise: 0.006
  - name: "low_sun"
    weather: {cloudiness: 10, precipitation: 0, sun_altitude_angle: 8,
              fog_density: 0, wetness: 0}
    lidar_noise: 0.007
  - name: "sunset"
    weather: {cloudiness: 25, precipitation: 0, sun_altitude_angle: 3,
              fog_density: 5, wetness: 0}
    lidar_noise: 0.007
  - name: "wet_after_rain"
    weather: {cloudiness: 50, precipitation: 0, sun_altitude_angle: 50,
              fog_density: 0, wetness: 70, precipitation_deposits: 50}
    lidar_noise: 0.008
  - name: "light_rain"
    weather: {cloudiness: 70, precipitation: 40, sun_altitude_angle: 40,
              fog_density: 10, wetness: 50}
    lidar_noise: {noise_stddev: 0.013, dropoff_general_rate: 0.08}
  - name: "mid_rain"
    weather: {cloudiness: 80, precipitation: 60, sun_altitude_angle: 35,
              fog_density: 15, wetness: 65, precipitation_deposits: 40}
    lidar_noise: {noise_stddev: 0.018, dropoff_general_rate: 0.13}
  - name: "heavy_rain"
    weather: {cloudiness: 90, precipitation: 80, sun_altitude_angle: 35,
              fog_density: 20, wetness: 80, precipitation_deposits: 60}
    lidar_noise: {noise_stddev: 0.022, dropoff_general_rate: 0.18}
  - name: "foggy_morning"
    weather: {cloudiness: 40, precipitation: 0, sun_altitude_angle: 20,
              fog_density: 60, fog_distance: 10, wetness: 20}
    lidar_noise: {noise_stddev: 0.018, dropoff_general_rate: 0.12}
  - name: "light_fog_noon"
    weather: {cloudiness: 30, precipitation: 0, sun_altitude_angle: 65,
              fog_density: 25, fog_distance: 25, wetness: 0}
    lidar_noise: {noise_stddev: 0.010, dropoff_general_rate: 0.05}
  - name: "night_clear"
    weather: {cloudiness: 15, precipitation: 0, sun_altitude_angle: 2,
              fog_density: 5, wetness: 0}
    lidar_noise: 0.007
  - name: "night_damp"
    weather: {cloudiness: 40, precipitation: 0, sun_altitude_angle: 2,
              fog_density: 10, wetness: 60, precipitation_deposits: 40}
    lidar_noise: 0.009

output:
  dataset_dir: "../../dataset"