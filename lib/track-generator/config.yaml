mode: 
  parameters: random        # random / custom
  voronoi: RANDOM           # RANDOM / EXPAND / EXTEND
  open_loop: true         # true / false
  missing_cone_ratio: 0.3

  # these values are used only if open_loop is set to true:
  random_open_loop: false
  ahead_ratio: 0.4       # 0.0 - 1.0 (this value is used only if random_open_loop is set to false)  
  behind_ratio: 0.05       # 0.0 - 1.0 (this value is used only if random_open_loop is set to false)

track_params:
  n_points: 60
  n_regions: 20
  min_bound: 0.0
  max_bound: 150.0

simulation:
  sim_type: FSDS     # IGNORE: Options: FSSIM, FSDS, GPX


output:
  plot_track: false
  visualise_voronoi: false
  create_output_file: false
  output_location: "/"

offsets:
  z_offset: 0.0
  lat_offset: 51.197682
  lon_offset: 5.323411
